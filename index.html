<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <title>WebAR Cá</title>

    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<a-scene
    embedded
    vr-mode-ui="enabled: false"
    arjs="trackingMethod: best;
          sourceType: webcam;
          debugUIEnabled: false;">

    <!-- Tải model -->
    <a-assets>
        <a-asset-item
            id="fish-obj"
            src="./assets/12265_Fish_v1_L2.obj">
        </a-asset-item>

        <a-asset-item
            id="fish-mtl"
            src="./assets/12265_Fish_v1_L2.mtl">
        </a-asset-item>
    </a-assets>

    <!-- Marker riêng -->
    <a-marker
        type="pattern"
        url="./markers/fish.patt">

        <a-obj-model
            src="#fish-obj"
            mtl="#fish-mtl"
            position="0 0 0"
            rotation="-90 0 0"
            scale="0.01 0.01 0.01">
        </a-obj-model>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

</body>
</html>
